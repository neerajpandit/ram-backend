<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Awas Vikas Parishad Lucknow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            /* Updated background gradient colors for a more professional feel */
            background: linear-gradient(to bottom right, #e0f2fe, #ffffff, #f0f9ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 28rem;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            /* Updated main title color for a professional look */
            color: #1e40af;
            text-align: center;
            margin-bottom: 2.5rem;
            letter-spacing: -0.025em;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1f2937;
            text-align: center;
            margin-bottom: 1rem;
        }

        p {
            font-size: 0.875rem;
            color: #4b5563;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 2rem;
            /* Increased margin to separate from the button */
        }

        .cta-button {
            display: block;
            width: 100%;
            padding: 0.75rem;
            /* Primary button color */
            background-color: #1e40af;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 700;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .cta-button:hover {
            background-color: #1d4ed8;
            /* Slightly lighter on hover */
        }

        .cta-button:active {
            transform: translateY(1px);
            /* Pressed effect */
        }

        .footer-note {
            font-size: 0.75rem;
            color: #6b7280;
            text-align: center;
            margin-top: 1.5rem;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.875rem;
            }

            h2 {
                font-size: 1.25rem;
            }

            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🏛️ Awas Vikas Parishad Lucknow</h1>

        <div class="card">
            <h2>Portal Login</h2>
            <p>
                Welcome to the official online service portal for Awas Vikas Parishad Lucknow.
                Please click the button below to proceed to the live application URL.
            </p>

            <a href="https://upavp.co.in" target="_blank" class="cta-button">
                Go to Live URL
            </a>

            <div class="footer-note">
                For authorized users and officials only. Contact the IT support team for login issues.
            </div>
        </div>
    </div>
</body>

</html>
